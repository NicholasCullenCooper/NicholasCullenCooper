<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Nicholas Cooper — software, photographs, prose. Chicago.">
  <defs>
    <style>
      .bg { fill: #0d1117; }
      .name { font-family: ui-sans-serif, system-ui, -apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif; font-weight: 800; font-size: 148px; fill: #f0f6fc; letter-spacing: -0.045em; }
      .meta { font-family: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace; font-size: 13px; fill: #8b949e; letter-spacing: 0.06em; }
      .accent { fill: #e1493a; }
      .rule { stroke: #30363d; stroke-width: 1; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="420"/>

  <!-- Top metadata strip -->
  <text class="meta" x="80" y="48">GITHUB · 2026 —</text>

  <!-- Vermillion mark, upper right -->
  <rect class="accent" x="1080" y="36" width="40" height="14"/>

  <!-- Name, stacked -->
  <text class="name" x="74" y="208">NICHOLAS</text>
  <text class="name" x="74" y="338">COOPER</text>

  <!-- Bottom rule -->
  <line class="rule" x1="80" y1="372" x2="1120" y2="372"/>

  <!-- Bottom metadata -->
  <text class="meta" x="80" y="396">SOFTWARE · PHOTOGRAPHS · PROSE</text>
  <text class="meta" x="1120" y="396" text-anchor="end">CHICAGO</text>
</svg>
